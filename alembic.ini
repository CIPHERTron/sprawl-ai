[alembic]
# Script location relative to where alembic is invoked (inside the api container: /app)
script_location = api/alembic

# env.py reads DATABASE_URL from the environment; this is a fallback for offline mode
sqlalchemy.url = postgresql+asyncpg://sprawl:changeme@postgres:5432/sprawl

# Output formatting
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
